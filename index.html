<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UCZTA Polska</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
width:100vw;
height:100vh;
overflow:hidden;

background-image:url("tło2.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* ================= MENU ================= */

#menuScreen{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.menuContainer{
position:relative;
width:min(70vw,1200px);
}

.menuContainer img{
width:100%;
display:block;
}

.menuButtons{
position:absolute;
top:30%;
left:0;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

.menuButton{
font-size:2rem;
cursor:pointer;
padding:10px 20px;
border-radius:12px;
transition:0.2s;
}

.menuButton:hover{
background:rgba(255,255,255,0.3);
}

/* ================= GRA ================= */

#gameScreen{
display:none;
width:100%;
height:100%;
}

.gameWrapper{
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

.plate{
width:min(75vw,700px);
height:min(75vw,700px);

border-radius:50%;
background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:40px;

box-shadow:0 0 30px rgba(0,0,0,0.2);
}

.riddle{
font-size:1.4rem;
text-align:center;
line-height:1.6;
}

.answer{
margin-top:20px;
font-size:2rem;
letter-spacing:10px;
}

input{
margin-top:20px;
padding:15px;
font-size:1.2rem;
width:min(80vw,400px);
}

button{
padding:12px 24px;
font-size:1rem;
cursor:pointer;
}

</style>
</head>
<body>

<!-- MENU -->

<div id="menuScreen">

<div class="menuContainer">

<img src="menu.png" alt="menu">

<div class="menuButtons">

<div class="menuButton" onclick="openGame()">
Danie dnia
</div>

<div class="menuButton">
Spiżarnia
</div>

<div class="menuButton">
Przepiśnik
</div>

<div class="menuButton">
Rekordy
</div>

</div>

</div>

</div>

<!-- GRA -->

<div id="gameScreen">

<div class="gameWrapper">

<div class="plate">

<div class="riddle">

Temat: profesjonalne meble bez końca przestawiane...?

</div>

<div class="answer">

_ _ _ _ _ _ _

</div>

<input
placeholder="Wpisz odpowiedź">

</div>

</div>

</div>

<script>

function openGame(){

document.getElementById("menuScreen").style.display="none";

document.getElementById("gameScreen").style.display="block";

}

</script>

</body>
</html>
