<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UCZTA Polska</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

/* ================== TŁO ================== */

body{

/* tło2.jpg */
background-image:url("tło2.jpg");

background-size:cover;
background-position:center;
height:100vh;
overflow:hidden;
}

/* ================== MENU ================== */

#menuScreen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* menu.png */
.menuBox img{
width:100%;
}

/* ================== PRZYCISKI ================== */

.menuBox{
position:relative;
width:70vw;
max-width:1200px;
}

.menuButtons{
position:absolute;
top:35%;
left:0;
width:100%;
text-align:center;
display:flex;
flex-direction:column;
gap:20px;
}

.button{
font-size:28px;
cursor:pointer;
padding:10px;
}

.button:hover{
background:rgba(255,255,255,0.3);
}

/* ================== GRA ================== */

#gameScreen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
}

.plate{

width:70vmin;
height:70vmin;
border-radius:50%;
background:white;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;
padding:20px;
}

.answer{
margin-top:20px;
font-size:32px;
letter-spacing:10px;
}

input{
margin-top:20px;
padding:10px;
font-size:18px;
}

</style>
</head>

<body>

<!-- ================= MENU ================= -->

<div id="menuScreen">

<div class="menuBox">

<!-- menu.png -->
<img src="menu.png">

<div class="menuButtons">

<div class="button" onclick="startGame()">
DANIE DNIA
</div>

<div class="button">
SPIŻARNIA
</div>

<div class="button">
PRZEPIŚNIK
</div>

<div class="button">
REKORDY
</div>

</div>

</div>

</div>

<!-- ================= GRA ================= -->

<div id="gameScreen">

<div class="plate">

<div>
TEMAT: profesjonalne meble bez końca przestawiane...
</div>

<div class="answer">
_ _ _ _ _ _ _
</div>

<input placeholder="Wpisz odpowiedź">

</div>

</div>

<script>

function startGame(){
document.getElementById("menuScreen").style.display="none";
document.getElementById("gameScreen").style.display="flex";
}

</script>

</body>
</html>
